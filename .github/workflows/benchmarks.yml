name: Benchmarks

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  benchmark:
    name: LQR benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-24.04]

    steps:
    - uses: actions/checkout@v7

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-${{ matrix.os }}
        repository-cache: true

    - name: Set min macOS version
      if: runner.os == 'macOS'
      run: |
        echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

    - name: Run benchmarks
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p benchmark-results
        bazel run //benchmarks:lqr_benchmark -- \
          --benchmark_min_time=0.01s \
          --benchmark_repetitions=1 \
          --benchmark_out="$PWD/benchmark-results/lqr-${{ runner.os }}.json" \
          --benchmark_out_format=json \
          | tee "benchmark-results/lqr-${{ runner.os }}.txt"

    - name: Summarize benchmarks
      shell: bash
      run: |
        {
          echo "## LQR benchmark (${{ runner.os }})"
          echo
          echo '```text'
          cat "benchmark-results/lqr-${{ runner.os }}.txt"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - uses: actions/upload-artifact@v7
      with:
        name: lqr-benchmark-${{ runner.os }}
        path: benchmark-results/*
